# ── Prefix ────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ───────────────────────────────────────────────────────
set -g default-shell /usr/bin/zsh
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on

# ── True color (WezTerm + Tokyo Night) ───────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ── Splits ────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation ──────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vi) ───────────────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Sélecteurs (choose-tree) triés par nom ───────────────────────
# Par défaut choose-tree trie par activité/création, pas par nom :
# on force le tri « name » (sessions préfixées 01-, 02-… et fenêtres).
bind s choose-tree -Zs -O name
bind w choose-tree -Zw -O name

# ── Reload config ────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# ── Plugins (TPM) ────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'

# Tokyo Night config
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_git 1
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_hostname 1
set -g @tokyo-night-tmux_window_id_style fsquare
set -g @tokyo-night-tmux_pane_id_style fsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare

# Resurrect & Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'nvim vim vi lazygit lazydocker btop "claude->claude --continue"'
# Restauration pilotée par tmux-sessionizer (au démarrage d'un terminal), PAS
# par continuum : évite la course serveur-froid / 'main' qui écrase les sessions.
# Continuum ne fait plus que l'autosave. (Restore manuel : prefix + Ctrl-r.)
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# fzf
TMUX_FZF_LAUNCH_KEY="F"

# ── Initialize TPM (keep at bottom) ──────────────────────────────
run '~/.config/tmux/plugins/tpm/tpm'
